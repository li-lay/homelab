---
services:
  traefik:
    image: traefik:latest
    ports:
      - "80:80"
      - "443:443"
    networks:
      - proxy
    environment:
      CF_DNS_API_TOKEN: /run/secrets/cf_token
    volumes:
      - ./data/traefik.yml:/traefik.yml:ro
      - "./data/acme.json:/acme.json" 
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    secrets:
      - cf_token

networks:
  proxy:
    external: true

secrets:
  cf_token:
    external: true
