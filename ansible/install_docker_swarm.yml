---
- name: Install Docker and Initialize Swarm
  hosts: docker_nodes
  become: yes

  tasks:
    - name: Update apt cache (for Debian-based systems)
      ansible.builtin.apt:
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Install necessary packages (for Debian-based systems)
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
      when: ansible_os_family == "Debian"

    - name: Add Docker GPG key (for Debian-based systems)
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
        keyring: /etc/apt/keyrings/docker.gpg
      when: ansible_os_family == "Debian"

    - name: Add Docker APT repository (for Debian-based systems)
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
      when: ansible_os_family == "Debian"

    - name: Add Docker APT repository (for Debian-based systems)
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else ansible_architecture }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_codename }} stable"
        state: present
        filename: docker
      when: ansible_os_family == "Debian"

    - name: Install Docker Engine (for Debian-based systems)
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
      when: ansible_os_family == "Debian"

    - name: Install necessary packages (for RedHat-based systems)
      ansible.builtin.yum:
        name:
          - yum-utils
        state: present
      when: ansible_os_family == "RedHat"

    - name: Add Docker YUM repository (for RedHat-based systems)
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/centos/docker-ce.repo
        dest: /etc/yum.repos.d/docker-ce.repo
      when: ansible_os_family == "RedHat"

    - name: Install Docker Engine (for RedHat-based systems)
      ansible.builtin.yum:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
      when: ansible_os_family == "RedHat"

    - name: Start and enable Docker service
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add current user to docker group (optional, for non-root docker commands)
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes
      # You might need to log out and back in for this to take effect for the current user

    - name: Initialize Docker Swarm (on the first host in the group)
      community.docker.docker_swarm:
        state: present
      run_once: true # This ensures the swarm is initialized only once, on the first host
      delegate_to: "{{ inventory_hostname }}" # Delegate to the host being processed (the first one)
      when: inventory_hostname == groups['docker_nodes'][0] # Only run on the very first host in the group
